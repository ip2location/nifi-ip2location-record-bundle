name: Release NAR

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release NAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build NAR
        run: mvn -B clean package

      - name: Locate NAR
        id: nar
        shell: bash
        run: |
          NAR_FILE=$(find . -path "*/target/*.nar" -type f | head -n 1)
          if [ -z "$NAR_FILE" ]; then
            echo "No .nar file found"
            exit 1
          fi

          echo "nar_file=$NAR_FILE" >> "$GITHUB_OUTPUT"
          echo "Found NAR: $NAR_FILE"

      - name: Create GitHub Release and upload NAR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.nar.outputs.nar_file }}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}"